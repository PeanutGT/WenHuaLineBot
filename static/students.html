<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧親師通 - 學生資料管理系統</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #38bdf8;
            --primary-hover: #0ea5e9;
            --bg-dark: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.1);
            --success: #4ade80;
            --error: #f87171;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            background-attachment: fixed;
            color: var(--text-main);
            margin: 0;
            padding: 40px 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            position: relative;
            overflow-y: auto;
            overflow-x: hidden;
            box-sizing: border-box;
        }

        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            z-index: 0;
            animation: float 10s infinite alternate ease-in-out;
        }
        .blob-1 {
            top: -10%; left: -10%;
            width: 400px; height: 400px;
            background: #3b82f6;
        }
        .blob-2 {
            bottom: -10%; right: -10%;
            width: 500px; height: 500px;
            background: #8b5cf6;
            animation-delay: -5s;
        }
        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 50px) scale(1.1); }
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 20px;
            box-sizing: border-box;
            z-index: 1;
            position: relative;
        }

        .card {
            background-color: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            padding: 32px;
            margin-bottom: 24px;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        @keyframes slideUp {
            0% { opacity: 0; transform: translateY(40px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        h1 {
            text-align: center;
            font-size: 24px;
            font-weight: 800;
            margin-top: 0;
            margin-bottom: 8px;
            color: var(--primary);
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
        }

        p.subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 32px;
            font-size: 14px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 20px;
        }

        input[type="password"], input[type="file"] {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2);
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: rgba(56, 189, 248, 0.15);
            color: var(--primary);
            border: 1px solid rgba(56, 189, 248, 0.4);
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover:not(:disabled) {
            background-color: rgba(56, 189, 248, 0.25);
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px var(--primary);
        }

        button:active:not(:disabled) {
            transform: scale(0.98);
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            filter: grayscale(100%);
        }

        button.btn-success {
            background-color: rgba(74, 222, 128, 0.15);
            color: var(--success);
            border-color: rgba(74, 222, 128, 0.4);
        }
        
        button.btn-success:hover:not(:disabled) {
            background-color: rgba(74, 222, 128, 0.25);
            border-color: var(--success);
            box-shadow: 0 10px 20px -10px var(--success);
        }

        .status-message {
            margin-top: 16px;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            display: none;
            font-weight: 600;
            text-align: center;
        }

        .status-message.success {
            display: block;
            background-color: rgba(74, 222, 128, 0.1);
            color: var(--success);
            border: 1px solid rgba(74, 222, 128, 0.2);
        }

        .status-message.error {
            display: block;
            background-color: rgba(248, 113, 113, 0.1);
            color: var(--error);
            border: 1px solid rgba(248, 113, 113, 0.2);
        }

        .hidden {
            display: none !important;
        }

        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            border-top: 3px solid var(--primary);
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 8px;
            display: none;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Student Table CSS */
        .st-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        .st-table th, .st-table td {
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 8px;
            text-align: left;
            font-size: 0.95rem;
        }
        .st-table th {
            background: rgba(0, 0, 0, 0.3);
            color: var(--primary);
            font-weight: 600;
        }
        .st-table tbody tr:nth-child(even) {
            background: rgba(255, 255, 255, 0.02);
        }
        .st-table tbody tr:hover {
            background: rgba(56, 189, 248, 0.1);
        }
    </style>
</head>
<body>

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

<div class="container">
    
    <!-- Login Section -->
    <div class="card" id="loginSection">
        <h1>學生系統權限驗證</h1>
        <p class="subtitle">系統自動讀取 ADMIN_TOKEN，或請手動輸入</p>
        
        <div class="form-group">
            <input type="password" id="adminToken" placeholder="輸入密碼..." autocomplete="current-password">
        </div>
        <button id="loginBtn">登入</button>
        <div id="loginStatus" class="status-message"></div>
    </div>

    <!-- Dashboard Section -->
    <div id="dashboardSection" class="hidden">
        
        <div style="display: flex; gap: 20px; flex-wrap: wrap;">
            <!-- Upload Section -->
            <div class="card" style="flex: 1; min-width: 300px; margin-bottom: 0;">
                <h1>📥 匯入學生名單</h1>
                <p class="subtitle">請上傳包含「學號、姓名、卡號、電話、班級、科目」的 Excel<br>若學號存在會自動覆蓋</p>
                <div class="form-group">
                    <input type="file" id="excelFile" accept=".xlsx, .xls">
                </div>
                <button id="uploadBtn">
                    <span class="loader" id="uploadLoader"></span> 覆蓋並上傳名單
                </button>
                <div id="uploadStatus" class="status-message"></div>
            </div>

            <!-- Export Section -->
            <div class="card" style="flex: 1; min-width: 300px; margin-bottom: 0;">
                <h1>📤 匯出學生名單</h1>
                <p class="subtitle">下載目前雲端庫中所有的學生資料<br>（包含家長聯絡方式、班級、科目）</p>
                <button id="exportBtn" class="btn-success" style="margin-top: 10px;">
                    下載 Excel 報表
                </button>
                <div id="exportStatus" class="status-message"></div>
            </div>
        </div>

        <!-- Preview Section -->
        <div class="card" style="margin-top: 20px;">
            <h1>👀 目前雲端學生名單</h1>
            <p class="subtitle" id="studentCount">載入中...</p>
            <div id="studentContent" style="max-height: 400px; overflow-y: auto; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;">
                <p style="color:#94a3b8; text-align:center; padding: 20px;">請先登入...</p>
            </div>
        </div>

    </div>
</div>

<script>
    let currentToken = sessionStorage.getItem('ADMIN_TOKEN') || '';

    const loginSection = document.getElementById('loginSection');
    const dashboardSection = document.getElementById('dashboardSection');
    const adminTokenInput = document.getElementById('adminToken');
    const loginBtn = document.getElementById('loginBtn');
    const loginStatus = document.getElementById('loginStatus');

    const uploadBtn = document.getElementById('uploadBtn');
    const excelFile = document.getElementById('excelFile');
    const uploadLoader = document.getElementById('uploadLoader');
    const uploadStatus = document.getElementById('uploadStatus');
    const exportBtn = document.getElementById('exportBtn');
    const exportStatus = document.getElementById('exportStatus');
    const studentContent = document.getElementById('studentContent');
    const studentCount = document.getElementById('studentCount');

    function showStatus(element, message, isError = false) {
        element.textContent = message;
        element.className = 'status-message ' + (isError ? 'error' : 'success');
    }

    if (currentToken) {
        adminTokenInput.value = currentToken;
        attemptLogin(currentToken);
    }

    loginBtn.addEventListener('click', () => {
        const token = adminTokenInput.value.trim();
        if (!token) {
            showStatus(loginStatus, '請輸入密碼！', true);
            return;
        }
        attemptLogin(token);
    });

    async function attemptLogin(token) {
        try {
            const res = await fetch('/api/students', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (!res.ok) throw new Error("密碼錯誤");
            
            currentToken = token;
            sessionStorage.setItem('ADMIN_TOKEN', token);
            
            loginSection.classList.add('hidden');
            dashboardSection.classList.remove('hidden');
            
            fetchStudents();
        } catch (e) {
            showStatus(loginStatus, '❌ 驗證失敗：' + e.message, true);
        }
    }

    uploadBtn.addEventListener('click', async () => {
        const file = excelFile.files[0];
        if (!file) {
            showStatus(uploadStatus, '請先選擇檔案', true);
            return;
        }

        uploadBtn.disabled = true;
        uploadLoader.style.display = 'inline-block';
        
        const formData = new FormData();
        formData.append('file', file);

        try {
            const response = await fetch('/api/sync-excel', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${currentToken}` },
                body: formData
            });
            
            if (!response.ok) {
                const err = await response.json();
                throw new Error(err.detail || "上傳失敗");
            }
            
            const result = await response.json();
            showStatus(uploadStatus, `✅ 同步成功！新增/更新家長 ${result.parents_updated} 筆，學生 ${result.students_updated} 筆。`, false);
            excelFile.value = '';
            
            fetchStudents();
        } catch (e) {
            showStatus(uploadStatus, '❌ 錯誤：' + e.message, true);
        } finally {
            uploadBtn.disabled = false;
            uploadLoader.style.display = 'none';
        }
    });

    exportBtn.addEventListener('click', async () => {
        exportBtn.disabled = true;
        exportStatus.className = 'status-message';
        try {
            const response = await fetch('/api/students/export', {
                method: 'GET',
                headers: { 'Authorization': `Bearer ${currentToken}` }
            });
            if (!response.ok) throw new Error('下載失敗');

            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = url;
            
            const disposition = response.headers.get('Content-Disposition');
            let filename = '學生名單.xlsx';
            if (disposition) {
                const utf8Regex = /filename\*=utf-8''([^;\n]*)/i;
                const matchesUtf8 = utf8Regex.exec(disposition);
                if (matchesUtf8 != null && matchesUtf8[1]) {
                    filename = decodeURIComponent(matchesUtf8[1]);
                }
            }
            
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
            showStatus(exportStatus, '✅ 下載成功！', false);
        } catch (error) {
            showStatus(exportStatus, '❌ ' + error.message, true);
        } finally {
            exportBtn.disabled = false;
        }
    });

    async function fetchStudents() {
        try {
            studentContent.innerHTML = '<p style="text-align:center; padding: 20px; color:#94a3b8;">載入中...</p>';
            const res = await fetch('/api/students', {
                headers: { 'Authorization': `Bearer ${currentToken}` }
            });
            if (res.ok) {
                const students = await res.json();
                studentCount.textContent = `共 ${students.length} 名學生`;
                
                if (students.length === 0) {
                    studentContent.innerHTML = '<p style="text-align:center; padding: 20px; color:#94a3b8;">尚未有學生資料</p>';
                    return;
                }
                
                let html = '<table class="st-table"><thead><tr><th>學號</th><th>姓名</th><th>班級</th><th>上課科目</th></tr></thead><tbody>';
                students.forEach(s => {
                    html += `<tr>
                        <td style="font-family: monospace; color: #94a3b8;">${s.student_number}</td>
                        <td style="font-weight: 600;">${s.name}</td>
                        <td style="color: #94a3b8;">${s.class_name || ''}</td>
                        <td style="color: #94a3b8;">${s.enrolled_subjects || ''}</td>
                    </tr>`;
                });
                html += '</tbody></table>';
                studentContent.innerHTML = html;
            }
        } catch (e) {
            console.error('Failed to fetch students:', e);
            studentContent.innerHTML = '<p style="text-align:center; padding: 20px; color:#f87171;">無法取得學生資料</p>';
        }
    }

</script>
</body>
</html>

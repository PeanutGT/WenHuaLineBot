<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧親師通 - 成績登錄系統</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #c4b5fd;
            --primary-hover: #a78bfa;
            --bg-dark: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.1);
            --success: #4ade80;
            --error: #f87171;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            background-attachment: fixed;
            color: var(--text-main);
            margin: 0;
            padding: 40px 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            position: relative;
            overflow-y: auto;
            overflow-x: hidden;
            box-sizing: border-box;
        }

        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            z-index: 0;
            animation: float 10s infinite alternate ease-in-out;
        }
        .blob-1 {
            top: -10%; left: -10%;
            width: 400px; height: 400px;
            background: #8b5cf6;
        }
        .blob-2 {
            bottom: -10%; right: -10%;
            width: 500px; height: 500px;
            background: #ec4899;
            animation-delay: -5s;
        }
        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 50px) scale(1.1); }
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 20px;
            box-sizing: border-box;
            z-index: 1;
            position: relative;
        }

        .card {
            background-color: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            padding: 32px;
            margin-bottom: 24px;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        @keyframes slideUp {
            0% { opacity: 0; transform: translateY(40px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        h1 {
            text-align: center;
            font-size: 24px;
            font-weight: 800;
            margin-top: 0;
            margin-bottom: 8px;
            color: var(--primary);
            text-shadow: 0 0 20px rgba(196, 181, 253, 0.4);
        }

        p.subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 32px;
            font-size: 14px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-muted);
        }

        input[type="text"], input[type="password"], select {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }
        
        select option {
            background: var(--bg-dark);
            color: white;
        }

        input:focus, select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(196, 181, 253, 0.2);
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: rgba(196, 181, 253, 0.15);
            color: var(--primary);
            border: 1px solid rgba(196, 181, 253, 0.4);
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover:not(:disabled) {
            background-color: rgba(196, 181, 253, 0.25);
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px var(--primary);
        }

        button:active:not(:disabled) {
            transform: scale(0.98);
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            filter: grayscale(100%);
        }

        button.btn-success {
            background-color: rgba(74, 222, 128, 0.15);
            color: var(--success);
            border-color: rgba(74, 222, 128, 0.4);
        }
        
        button.btn-success:hover:not(:disabled) {
            background-color: rgba(74, 222, 128, 0.25);
            border-color: var(--success);
            box-shadow: 0 10px 20px -10px var(--success);
        }
        
        button.btn-danger {
            background-color: rgba(248, 113, 113, 0.15);
            color: var(--error);
            border-color: rgba(248, 113, 113, 0.4);
        }
        
        button.btn-danger:hover:not(:disabled) {
            background-color: rgba(248, 113, 113, 0.25);
            border-color: var(--error);
            box-shadow: 0 10px 20px -10px var(--error);
        }
        
        button.btn-small {
            width: auto;
            padding: 6px 12px;
            font-size: 13px;
            border-radius: 6px;
            margin-right: 4px;
        }

        .status-message {
            margin-top: 16px;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            display: none;
            font-weight: 600;
            text-align: center;
        }

        .status-message.success {
            display: block;
            background-color: rgba(74, 222, 128, 0.1);
            color: var(--success);
            border: 1px solid rgba(74, 222, 128, 0.2);
        }

        .status-message.error {
            display: block;
            background-color: rgba(248, 113, 113, 0.1);
            color: var(--error);
            border: 1px solid rgba(248, 113, 113, 0.2);
        }

        .hidden {
            display: none !important;
        }

        /* Table Styles */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 14px;
        }
        th, td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
        }
        th {
            color: var(--text-muted);
            font-weight: 600;
        }
        tr:hover {
            background-color: rgba(255, 255, 255, 0.02);
        }
    </style>
</head>
<body>

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

<div class="container">
    
    <!-- Login Section -->
    <div class="card" id="loginSection">
        <h1>成績系統權限驗證</h1>
        <p class="subtitle">系統自動讀取 ADMIN_TOKEN，或請手動輸入</p>
        
        <div class="form-group">
            <input type="password" id="adminToken" placeholder="輸入密碼..." autocomplete="current-password">
        </div>
        <button id="loginBtn">登入</button>
        <div id="loginStatus" class="status-message"></div>
    </div>

    <!-- Dashboard Section -->
    <div id="dashboardSection" class="hidden">
        
        <!-- Input Section -->
        <div class="card">
            <h1>📝 批次登錄學生成績</h1>
            <p class="subtitle">請先輸入本次考試名稱，接著直接在表格中填寫分數（未填寫的學生不會送出）</p>
            
            <div class="form-group" style="display: flex; gap: 12px; margin-bottom: 16px;">
                <div style="flex: 1;">
                    <label>篩選班級：</label>
                    <select id="classFilter" style="width: 100%; padding: 12px; border-radius: 8px; background: rgba(0,0,0,0.2); border: 1px solid var(--border-color); color: white;">
                        <option value="">-- 全部班級 --</option>
                    </select>
                </div>
                <div style="flex: 1;">
                    <label>篩選科目：</label>
                    <select id="subjectFilter" style="width: 100%; padding: 12px; border-radius: 8px; background: rgba(0,0,0,0.2); border: 1px solid var(--border-color); color: white;">
                        <option value="">-- 全部科目 --</option>
                    </select>
                </div>
            </div>
            
            <div class="form-group">
                <label>考試名稱 (如：國一上第一次段考 數學)：</label>
                <input type="text" id="examName" placeholder="請輸入考試名稱" style="font-size:18px; font-weight:bold; color:var(--primary);">
            </div>
            
            <div style="overflow-x: auto; max-height: 400px; margin-bottom: 20px;">
                <table id="bulkInputTable" style="margin-top: 0;">
                    <thead>
                        <tr>
                            <th style="position: sticky; top: 0; background: var(--bg-dark); z-index: 2;">學號</th>
                            <th style="position: sticky; top: 0; background: var(--bg-dark); z-index: 2;">學生姓名</th>
                            <th style="position: sticky; top: 0; background: var(--bg-dark); z-index: 2;">成績 / 狀態 (可填"缺考")</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Data inserted here -->
                    </tbody>
                </table>
            </div>

            <button id="submitBtn" class="btn-success">批次儲存成績</button>
            <div id="submitStatus" class="status-message"></div>
        </div>

        <!-- History & Export Section -->
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 24px;">
                <div>
                    <h1 style="text-align: left; margin-bottom: 4px;">📋 歷史紀錄與成績匯出</h1>
                    <p class="subtitle" style="text-align: left; margin-bottom: 0;">顯示最新 50 筆紀錄，可直接點擊編輯或刪除</p>
                </div>
                
                <!-- Export Controls -->
                <div style="display: flex; gap: 10px; align-items: center;">
                    <select id="exportExamName" style="padding: 10px; border-radius: 8px; width: 200px;">
                        <option value="">-- 全部考試成績 --</option>
                    </select>
                    <button id="exportBtn" class="btn-success" style="width: auto; padding: 10px 20px; border-radius: 8px;">📥 下載 Excel</button>
                </div>
            </div>
            <div style="overflow-x: auto;">
                <table id="historyTable">
                    <thead>
                        <tr>
                            <th>登錄時間</th>
                            <th>學生姓名</th>
                            <th>考試名稱</th>
                            <th>科目</th>
                            <th>成績</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Data inserted here -->
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</div>

<script src="/static/auth.js"></script>
<script>
    let allStudents = [];

    const authManager = new AuthManager('/api/students', (students, token) => {
        allStudents = students;
        populateFilters();
        filterAndRenderStudents();
        loadHistory();
    });

    Object.defineProperty(window, 'currentToken', {
        get: () => authManager.currentToken
    });

    const examName = document.getElementById('examName');
    const classFilter = document.getElementById('classFilter');
    const subjectFilter = document.getElementById('subjectFilter');
    const bulkInputTableBody = document.querySelector('#bulkInputTable tbody');
    const submitBtn = document.getElementById('submitBtn');
    const submitStatus = document.getElementById('submitStatus');
    const historyTableBody = document.querySelector('#historyTable tbody');

    function showStatus(element, message, isError = false) {
        element.textContent = message;
        element.className = 'status-message ' + (isError ? 'error' : 'success');
    }

    function populateFilters() {
        const classes = new Set();
        const subjects = new Set();
        
        allStudents.forEach(s => {
            if (s.class_name) classes.add(s.class_name);
            if (s.enrolled_subjects) {
                s.enrolled_subjects.split(',').forEach(sub => {
                    if (sub.trim()) subjects.add(sub.trim());
                });
            }
        });
        
        classes.forEach(c => {
            const opt = document.createElement('option');
            opt.value = c; opt.textContent = c;
            classFilter.appendChild(opt);
        });
        
        subjects.forEach(sub => {
            const opt = document.createElement('option');
            opt.value = sub; opt.textContent = sub;
            subjectFilter.appendChild(opt);
        });
    }

    classFilter.addEventListener('change', filterAndRenderStudents);
    subjectFilter.addEventListener('change', filterAndRenderStudents);

    function filterAndRenderStudents() {
        const selClass = classFilter.value;
        const selSubj = subjectFilter.value;
        
        let filtered = allStudents;
        if (selClass) {
            filtered = filtered.filter(s => s.class_name === selClass);
        }
        if (selSubj) {
            filtered = filtered.filter(s => {
                if (!s.enrolled_subjects) return false;
                const subs = s.enrolled_subjects.split(',').map(x => x.trim());
                return subs.includes(selSubj);
            });
        }
        
        populateStudents(filtered);
    }

    function populateStudents(students) {
        bulkInputTableBody.innerHTML = '';
        if (students.length === 0) {
            bulkInputTableBody.innerHTML = '<tr><td colspan="3" style="text-align:center;">尚未建立學生資料</td></tr>';
            return;
        }
        students.forEach(s => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td style="color:var(--text-muted);">${s.student_number}</td>
                <td style="font-weight:600;">${s.name}</td>
                <td>
                    <input type="text" class="score-input" data-studentid="${s.id}" placeholder="輸入分數..." style="padding:8px; font-size:14px; width: 100%; box-sizing: border-box;">
                </td>
            `;
            bulkInputTableBody.appendChild(tr);
        });
        
        // Arrow key navigation for Excel-like feel
        const inputs = Array.from(document.querySelectorAll('.score-input'));
        inputs.forEach((input, index) => {
            input.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowDown' || e.key === 'Enter') {
                    e.preventDefault();
                    if (index + 1 < inputs.length) inputs[index + 1].focus();
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    if (index - 1 >= 0) inputs[index - 1].focus();
                }
            });
        });
    }

    submitBtn.addEventListener('click', async () => {
        const eName = examName.value.trim();
        if (!eName) {
            showStatus(submitStatus, '請先填寫「考試名稱」！', true);
            examName.focus();
            return;
        }

        const inputs = Array.from(document.querySelectorAll('.score-input'));
        const scores = [];
        inputs.forEach(input => {
            const val = input.value.trim();
            if (val) {
                scores.push({
                    student_id: parseInt(input.dataset.studentid),
                    score: val
                });
            }
        });

        if (scores.length === 0) {
            showStatus(submitStatus, '您沒有填寫任何成績！請在表格內填寫分數。', true);
            return;
        }

        submitBtn.disabled = true;
        try {
            const res = await fetch('/api/grades/bulk', {
                method: 'POST',
                headers: { 
                    'Authorization': `Bearer ${currentToken}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    exam_name: eName,
                    subject: subjectFilter.value || null,
                    scores: scores
                })
            });

            if (!res.ok) throw new Error("儲存失敗");
            
            showStatus(submitStatus, `✅ 批次儲存成功！共紀錄了 ${scores.length} 筆成績。`, false);
            
            // Clear inputs
            inputs.forEach(input => input.value = '');
            
            loadHistory();
        } catch (e) {
            showStatus(submitStatus, '❌ ' + e.message, true);
        } finally {
            submitBtn.disabled = false;
        }
    });

    const exportExamName = document.getElementById('exportExamName');
    const exportBtn = document.getElementById('exportBtn');

    async function loadHistory() {
        try {
            const res = await fetch('/api/grades/recent', {
                headers: { 'Authorization': `Bearer ${currentToken}` }
            });
            if (res.ok) {
                const records = await res.json();
                historyTableBody.innerHTML = '';
                
                // Populate export dropdown with unique exam names
                const examNames = new Set();
                records.forEach(r => {
                    if(r.exam_name) examNames.add(r.exam_name);
                });
                const currentExportSel = exportExamName.value;
                exportExamName.innerHTML = '<option value="">-- 全部考試成績 --</option>';
                examNames.forEach(ename => {
                    const opt = document.createElement('option');
                    opt.value = ename; opt.textContent = ename;
                    exportExamName.appendChild(opt);
                });
                exportExamName.value = currentExportSel;

                records.forEach(r => {
                    const tr = document.createElement('tr');
                    tr.id = `row-${r.id}`;
                    tr.innerHTML = `
                        <td style="color:var(--text-muted)">${r.date}</td>
                        <td style="font-weight:600">${r.student_name}</td>
                        <td class="col-exam">${r.exam_name}</td>
                        <td class="col-subject">${r.subject || ''}</td>
                        <td class="col-score" style="color:var(--primary); font-weight:600">${r.score}</td>
                        <td>
                            <button class="btn-small" onclick="editRow(${r.id}, '${r.exam_name}', '${r.subject || ''}', '${r.score}')">✏️ 編輯</button>
                            <button class="btn-small btn-danger" onclick="deleteRow(${r.id})">🗑️ 刪除</button>
                        </td>
                    `;
                    historyTableBody.appendChild(tr);
                });
            }
        } catch (e) {
            console.error("Failed to load history", e);
        }
    }

    function editRow(id, oldExam, oldSubj, oldScore) {
        const tr = document.getElementById(`row-${id}`);
        tr.querySelector('.col-exam').innerHTML = `<input type="text" id="edit-exam-${id}" value="${oldExam}" style="padding:6px; font-size:13px; width:100px;">`;
        tr.querySelector('.col-subject').innerHTML = `<input type="text" id="edit-subj-${id}" value="${oldSubj}" style="padding:6px; font-size:13px; width:80px;">`;
        tr.querySelector('.col-score').innerHTML = `<input type="text" id="edit-score-${id}" value="${oldScore}" style="padding:6px; font-size:13px; width:60px;">`;
        tr.querySelector('td:last-child').innerHTML = `
            <button class="btn-small btn-success" onclick="saveRow(${id})">💾 儲存</button>
            <button class="btn-small btn-danger" onclick="loadHistory()">❌ 取消</button>
        `;
    }

    async function saveRow(id) {
        const exam = document.getElementById(`edit-exam-${id}`).value.trim();
        const subj = document.getElementById(`edit-subj-${id}`).value.trim();
        const score = document.getElementById(`edit-score-${id}`).value.trim();
        
        try {
            const res = await fetch(`/api/grades/${id}`, {
                method: 'PUT',
                headers: { 
                    'Authorization': `Bearer ${currentToken}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    exam_name: exam,
                    subject: subj || null,
                    score: score
                })
            });
            if (res.ok) {
                loadHistory(); // Reload table
            } else {
                alert("儲存失敗");
            }
        } catch (e) {
            alert("系統錯誤");
        }
    }

    async function deleteRow(id) {
        if (!confirm("確定要刪除這筆成績紀錄嗎？")) return;
        
        try {
            const res = await fetch(`/api/grades/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${currentToken}` }
            });
            if (res.ok) {
                loadHistory();
            } else {
                alert("刪除失敗");
            }
        } catch (e) {
            alert("系統錯誤");
        }
    }

    exportBtn.addEventListener('click', () => {
        const ename = exportExamName.value;
        let url = `/api/grades/export?token=${encodeURIComponent(currentToken)}`;
        if (ename) {
            url += `&exam_name=${encodeURIComponent(ename)}`;
        }
        window.location.href = url;
    });
</script>
</body>
</html>

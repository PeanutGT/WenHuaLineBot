<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="智慧親師通 - 補習班後台管理系統，支援快速匯入名單與下載報表。">
    <title>智慧親師通 - 補習班後台管理</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #38bdf8;
            --primary-hover: #0ea5e9;
            --bg-dark: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.1);
            --success: #4ade80;
            --error: #f87171;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            background-attachment: fixed;
            color: var(--text-main);
            margin: 0;
            padding: 40px 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            position: relative;
            overflow-y: auto;
            overflow-x: hidden;
            box-sizing: border-box;
        }

        /* Ambient background blobs for premium feel */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            z-index: 0;
            animation: float 10s infinite alternate ease-in-out;
        }
        .blob-1 {
            top: -10%; left: -10%;
            width: 400px; height: 400px;
            background: #3b82f6;
        }
        .blob-2 {
            bottom: -10%; right: -10%;
            width: 500px; height: 500px;
            background: #8b5cf6;
            animation-delay: -5s;
        }
        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 50px) scale(1.1); }
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
            box-sizing: border-box;
            z-index: 1;
            position: relative;
        }

        .card {
            background-color: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            padding: 32px;
            margin-bottom: 24px;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        @keyframes slideUp {
            0% { opacity: 0; transform: translateY(40px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.2);
        }

        h1 {
            text-align: center;
            font-size: 24px;
            font-weight: 800;
            margin-top: 0;
            margin-bottom: 8px;
            color: var(--primary);
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
        }

        p.subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 32px;
            font-size: 14px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-muted);
        }

        input[type="password"], input[type="file"] {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        input[type="password"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2);
        }

        input[type="file"]::file-selector-button {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 8px 16px;
            margin-right: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        input[type="file"]::file-selector-button:hover {
            background: rgba(255,255,255,0.2);
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: rgba(56, 189, 248, 0.15);
            color: var(--primary);
            border: 1px solid rgba(56, 189, 248, 0.4);
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        button:hover:not(:disabled) {
            background-color: rgba(56, 189, 248, 0.25);
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px var(--primary);
        }

        button:active:not(:disabled) {
            transform: scale(0.98);
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            filter: grayscale(100%);
        }

        button.btn-success {
            background-color: rgba(74, 222, 128, 0.15);
            color: var(--success);
            border-color: rgba(74, 222, 128, 0.4);
        }
        
        button.btn-success:hover:not(:disabled) {
            background-color: rgba(74, 222, 128, 0.25);
            border-color: var(--success);
            box-shadow: 0 10px 20px -10px var(--success);
        }

        .status-message {
            margin-top: 16px;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            display: none;
            font-weight: 600;
            text-align: center;
        }

        .status-message.success {
            display: block;
            background-color: rgba(74, 222, 128, 0.1);
            color: var(--success);
            border: 1px solid rgba(74, 222, 128, 0.2);
        }

        .status-message.error {
            display: block;
            background-color: rgba(248, 113, 113, 0.1);
            color: var(--error);
            border: 1px solid rgba(248, 113, 113, 0.2);
        }

        .hidden {
            display: none !important;
        }

        /* Loading spinner */
        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            border-top: 3px solid var(--primary);
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 8px;
            display: none;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Group Management Styles */
        .group-list { margin-top: 16px; display: flex; flex-direction: column; gap: 12px; }
        .group-item { background: rgba(0, 0, 0, 0.2); border: 1px solid var(--border-color); border-radius: 12px; padding: 16px; display: flex; justify-content: space-between; align-items: center; }
        .group-info h3 { margin: 0 0 4px 0; font-size: 16px; color: var(--primary); }
        .group-info p { margin: 0; font-size: 13px; color: var(--text-muted); }
        .btn-danger { background-color: rgba(248, 113, 113, 0.15); color: var(--error); border-color: rgba(248, 113, 113, 0.4); padding: 8px 16px; width: auto; font-size: 14px; }
        .btn-danger:hover:not(:disabled) { background-color: rgba(248, 113, 113, 0.25); border-color: var(--error); box-shadow: 0 10px 20px -10px var(--error); transform: translateY(-2px); }
        .schedule-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
        .schedule-row select, .schedule-row input[type="time"] { background: rgba(0, 0, 0, 0.2); border: 1px solid var(--border-color); border-radius: 8px; color: white; padding: 8px; outline: none; }
        .schedule-row select option { background: var(--bg-dark); }
        .remove-row-btn { background: transparent; border: none; color: var(--error); cursor: pointer; padding: 4px; font-size: 18px; width: auto; box-shadow: none; }
        .remove-row-btn:hover { background: transparent; box-shadow: none; transform: scale(1.1); color: #ff8f8f; border: none; }
    </style>
</head>
<body>

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

<div class="container">
    
    <!-- Login Section -->
    <div class="card" id="loginSection">
        <h1>後台管理系統登入</h1>
        <p class="subtitle">請輸入您的管理員密碼 (ADMIN_TOKEN)</p>
        
        <div class="form-group">
            <input type="password" id="adminToken" placeholder="輸入密碼..." autocomplete="current-password">
        </div>
        <button id="loginBtn">登入系統</button>
        <div id="loginStatus" class="status-message"></div>
    </div>

    <!-- Dashboard Section (Hidden by default) -->
    <div id="dashboardSection" class="hidden">
        
        <div style="margin-bottom: 24px;">
            <button onclick="window.open('grades.html', '_blank')" style="background-color: rgba(139, 92, 246, 0.15); color: #c4b5fd; border-color: rgba(139, 92, 246, 0.4);">
                📊 前往成績登錄與管理系統
            </button>
        </div>
        <!-- Upload Section -->
        <div class="card">
            <h1>📥 匯入學生名單</h1>
            <p class="subtitle">請上傳包含「學號、姓名、卡號、簡訊電話1/媽媽手機/爸爸手機」的 Excel 檔案</p>
            
            <div class="form-group">
                <input type="file" id="excelFile" accept=".xlsx, .xls">
            </div>
            <button id="uploadBtn">
                <span class="loader" id="uploadLoader"></span> 上傳並同步資料庫
            </button>
            <div id="uploadStatus" class="status-message"></div>
        </div>

        <!-- Export Section -->
        <div class="card">
            <h1>📤 匯出今日出勤紀錄</h1>
            <p class="subtitle">下載當日所有學生的「進班/離班」打卡明細</p>
            
            <button id="exportBtn" class="btn-success">下載 Excel 報表</button>
            <div id="exportStatus" class="status-message"></div>
        </div>

        <!-- Group Schedule Section -->
        <div class="card">
            <h1>📅 班級與課表管理</h1>
            <p class="subtitle">設定班級與表定時間，Excel 匯入時只要有「班級」欄位即會自動關聯</p>
            
            <div class="form-group">
                <input type="text" id="newGroupName" placeholder="請輸入新班級名稱，例如：國一先修班" style="margin-bottom: 12px;">
                <label>設定上課時間：</label>
                <div id="scheduleContainer">
                    <!-- Dynamic rows -->
                </div>
                <button type="button" onclick="addScheduleRow()" style="background:transparent; border: 1px dashed var(--border-color); margin-bottom: 16px; color: var(--text-muted); padding: 8px;">+ 新增一天上課日</button>
                <button type="button" class="btn-success" id="createGroupBtn">儲存並建立班級</button>
                <div id="groupStatus" class="status-message"></div>
            </div>
            
            <div style="margin-top: 32px; border-top: 1px solid var(--border-color); padding-top: 16px;">
                <label>已建立的班級清單：</label>
                <div class="group-list" id="groupList">
                    <!-- Groups loaded here -->
                </div>
            </div>
        </div>

    </div>
</div>

<script>
    let currentToken = '';

    const loginSection = document.getElementById('loginSection');
    const dashboardSection = document.getElementById('dashboardSection');
    const adminTokenInput = document.getElementById('adminToken');
    const loginBtn = document.getElementById('loginBtn');
    const loginStatus = document.getElementById('loginStatus');

    const excelFile = document.getElementById('excelFile');
    const uploadBtn = document.getElementById('uploadBtn');
    const uploadLoader = document.getElementById('uploadLoader');
    const uploadStatus = document.getElementById('uploadStatus');

    const exportBtn = document.getElementById('exportBtn');
    const exportStatus = document.getElementById('exportStatus');

    function showStatus(element, message, isError = false) {
        element.textContent = message;
        element.className = 'status-message ' + (isError ? 'error' : 'success');
    }

    loginBtn.addEventListener('click', () => {
        const token = adminTokenInput.value.trim();
        if (!token) {
            showStatus(loginStatus, '請輸入密碼！', true);
            return;
        }
        currentToken = token;
        
        loginSection.classList.add('hidden');
        dashboardSection.classList.remove('hidden');
        loadGroups();
    });

    adminTokenInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') loginBtn.click();
    });

    uploadBtn.addEventListener('click', async () => {
        const file = excelFile.files[0];
        if (!file) {
            showStatus(uploadStatus, '請先選擇一個 Excel 檔案！', true);
            return;
        }

        const formData = new FormData();
        formData.append('file', file);

        uploadBtn.disabled = true;
        uploadLoader.style.display = 'inline-block';
        uploadStatus.className = 'status-message'; // hide previous

        try {
            const response = await fetch('/api/sync-excel', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${currentToken}`
                },
                body: formData
            });

            if (!response.ok) {
                const errData = await response.json();
                throw new Error(errData.detail || '上傳失敗或密碼錯誤');
            }

            const result = await response.json();
            showStatus(uploadStatus, `✅ 同步成功！新增/更新家長 ${result.parents_updated} 筆，學生 ${result.students_updated} 筆。`, false);
            excelFile.value = ''; // clear input
        } catch (error) {
            showStatus(uploadStatus, '❌ ' + error.message, true);
        } finally {
            uploadBtn.disabled = false;
            uploadLoader.style.display = 'none';
        }
    });

    exportBtn.addEventListener('click', async () => {
        exportBtn.disabled = true;
        exportStatus.className = 'status-message';

        try {
            const response = await fetch('/api/attendance/export', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${currentToken}`
                }
            });

            if (!response.ok) {
                const errData = await response.json();
                throw new Error(errData.detail || '下載失敗或密碼錯誤');
            }

            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = url;
            
            const disposition = response.headers.get('Content-Disposition');
            let filename = '出勤紀錄.xlsx';
            if (disposition) {
                const utf8Regex = /filename\*=utf-8''([^;\n]*)/i;
                const matchesUtf8 = utf8Regex.exec(disposition);
                if (matchesUtf8 != null && matchesUtf8[1]) {
                    filename = decodeURIComponent(matchesUtf8[1]);
                } else {
                    const filenameRegex = /filename[^;=\n]*=((['"]).*?\2|[^;\n]*)/;
                    const matches = filenameRegex.exec(disposition);
                    if (matches != null && matches[1]) { 
                        filename = matches[1].replace(/['"]/g, '');
                    }
                }
            }
            
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
            
            showStatus(exportStatus, '✅ 下載成功！', false);
        } catch (error) {
            showStatus(exportStatus, '❌ ' + error.message, true);
        } finally {
            exportBtn.disabled = false;
        }
    });

    // Group Management Logic
    const scheduleContainer = document.getElementById('scheduleContainer');
    const groupList = document.getElementById('groupList');
    const createGroupBtn = document.getElementById('createGroupBtn');
    const groupStatus = document.getElementById('groupStatus');
    const newGroupName = document.getElementById('newGroupName');

    const dayMap = ['星期一', '星期二', '星期三', '星期四', '星期五', '星期六', '星期日'];

    function addScheduleRow() {
        const row = document.createElement('div');
        row.className = 'schedule-row';
        row.innerHTML = `
            <select class="sched-day">
                <option value="0">星期一</option><option value="1">星期二</option><option value="2">星期三</option><option value="3">星期四</option><option value="4">星期五</option><option value="5">星期六</option><option value="6">星期日</option>
            </select>
            <input type="time" class="sched-arr" value="17:00" title="到班時間">
            <span style="color:var(--text-muted)">~</span>
            <input type="time" class="sched-dep" value="21:00" title="放學時間">
            <button type="button" class="remove-row-btn" onclick="this.parentElement.remove()">✕</button>
        `;
        scheduleContainer.appendChild(row);
    }

    async function loadGroups() {
        try {
            const res = await fetch('/api/groups', {
                headers: { 'Authorization': `Bearer ${currentToken}` }
            });
            if (!res.ok) throw new Error("載入班級失敗");
            const groups = await res.json();
            groupList.innerHTML = '';
            
            if (groups.length === 0) {
                groupList.innerHTML = '<p style="text-align:center; color:var(--text-muted);">尚未建立任何班級</p>';
                return;
            }

            groups.forEach(g => {
                const item = document.createElement('div');
                item.className = 'group-item';
                let schedHtml = g.schedules.map(s => `${dayMap[s.day_of_week]} ${s.arrival_time.substring(0,5)}~${s.departure_time.substring(0,5)}`).join('、');
                if (!schedHtml) schedHtml = '無設定課表';
                
                item.innerHTML = `
                    <div class="group-info">
                        <h3>${g.name}</h3>
                        <p>${schedHtml}</p>
                    </div>
                    <button class="btn-danger" onclick="deleteGroup(${g.id})">刪除</button>
                `;
                groupList.appendChild(item);
            });
        } catch (e) {
            console.error(e);
        }
    }

    async function deleteGroup(id) {
        if (!confirm('確定要刪除這個班級嗎？學生的班級關聯將會被清除。')) return;
        try {
            const res = await fetch(`/api/groups/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${currentToken}` }
            });
            if (res.ok) {
                loadGroups();
            }
        } catch (e) {
            alert('刪除失敗');
        }
    }

    createGroupBtn.addEventListener('click', async () => {
        const name = newGroupName.value.trim();
        if (!name) { showStatus(groupStatus, '請輸入班級名稱', true); return; }
        
        const schedules = [];
        const rows = scheduleContainer.querySelectorAll('.schedule-row');
        rows.forEach(r => {
            schedules.push({
                day_of_week: parseInt(r.querySelector('.sched-day').value),
                arrival_time: r.querySelector('.sched-arr').value,
                departure_time: r.querySelector('.sched-dep').value
            });
        });

        createGroupBtn.disabled = true;
        try {
            const res = await fetch('/api/groups', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${currentToken}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, schedules })
            });
            if (!res.ok) {
                const err = await res.json();
                throw new Error(err.detail || '建立失敗');
            }
            showStatus(groupStatus, '✅ 班級建立成功！', false);
            newGroupName.value = '';
            scheduleContainer.innerHTML = '';
            addScheduleRow(); // reset one row
            loadGroups();
        } catch (e) {
            showStatus(groupStatus, '❌ ' + e.message, true);
        } finally {
            createGroupBtn.disabled = false;
        }
    });

    // Load initial row
    addScheduleRow();

</script>

</body>
</html>

services:
  - type: web
    name: wenhua-linebot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: ADMIN_TOKEN
        sync: false
      - key: CRON_TOKEN
        sync: false
      - key: KIOSK_TOKEN
        sync: false
      - key: ALLOWED_ORIGINS
        value: "*"
